<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>질문 판정단 게임</title>
  
  <!-- 폰트 불러오기 -->
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <!-- CDN: 고정 버전으로 교체 (unpkg 버전 태그 없는 URL이 간헐적으로 실패하는 문제 수정) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background-color: #050b14;
      font-family: 'Noto Sans KR', sans-serif;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
    }
    
    .title-font {
      font-family: 'Black Han Sans', sans-serif;
    }

    .glass-panel {
      background: rgba(17, 24, 39, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 195, 255, 0.03);
    }
    
    .neon-border {
      border: 1px solid rgba(0, 255, 255, 0.3);
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.1), inset 0 0 10px rgba(0, 255, 255, 0.1);
    }

    .starfield {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: -1;
      background: 
        radial-gradient(circle at 15% 50%, rgba(20, 40, 80, 0.4) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(10, 50, 70, 0.4) 0%, transparent 50%);
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle infinite ease-in-out;
    }
    
    /* 스크롤바 꾸미기 */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(0, 255, 255, 0.3);
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <!-- 리액트 앱이 들어갈 자리 -->
  <div id="root"></div>

  <!-- 실제 프로그램 로직 (Babel을 통해 브라우저에서 바로 해석됨) -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 자체 제작 아이콘 컴포넌트 (외부 연결 오류 방지용) ---
    const IconPlay = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>;
    const IconChevronRight = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 18l6-6-6-6"/></svg>;
    const IconCopy = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;
    const IconCheckCircle = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
    const IconXCircle = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>;
    const IconMicroscope = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 18h8"/><path d="M3 22h18"/><path d="M14 22a7 7 0 1 0 0-14h-1"/><path d="M9 14h2"/><path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z"/><path d="M12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3"/></svg>;
    const IconSearch = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
    const IconAtom = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="1"/><path d="M20.2 20.2c2.04-2.03.02-7.36-4.5-11.9-4.54-4.52-9.87-6.54-11.9-4.5-2.04 2.03-.02 7.36 4.5 11.9 4.54 4.52 9.87 6.54 11.9 4.5Z"/><path d="M15.7 3.8c-2.04-2.03-7.36-.02-11.9 4.5-4.54 4.52-6.54 9.87-4.5 11.9 2.04 2.03 7.36.02 11.9-4.5 4.54-4.52 6.54-9.87 4.5-11.9Z"/></svg>;
    const IconCpu = ({ size=24, className="" }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>;

    // --- 데이터베이스 ---
    const QUESTION_DB = [
      // 높은 수준 (15개)
      { id: 1, text: "해수면 온도가 1℃ 상승할 때 바닷물 속 용존산소량은 얼마나 줄어들까?", type: "high", reason: "변인(해수면 온도, 용존산소량)이 명확하고 측정 가능합니다." },
      { id: 2, text: "온도가 10℃ 높아지면 강낭콩의 발아율은 몇 % 변할까?", type: "high", reason: "구체적인 수치 변화를 묻고 있으며 실험을 통해 확인할 수 있습니다." },
      { id: 3, text: "미세먼지 농도와 특정 지역의 호흡기 질환 발생률 사이에는 어떤 상관관계가 있을까?", type: "high", reason: "데이터 분석을 통해 두 변인 간의 관계를 탐구할 수 있습니다." },
      { id: 4, text: "태양광 패널의 기울기에 따라 하루 동안 생산되는 전력량은 어떻게 달라질까?", type: "high", reason: "조건(기울기)에 따른 결과(전력량)를 실험으로 측정할 수 있습니다." },
      { id: 5, text: "플라스틱의 종류(PET, PE, PP)에 따라 땅속에서 분해되는 속도는 어떻게 다를까?", type: "high", reason: "비교 대상이 명확하고 실험을 통해 데이터를 얻을 수 있습니다." },
      { id: 6, text: "교실 창문 개방 시간에 따른 실내 이산화탄소 농도 변화는 어떠한가?", type: "high", reason: "측정 가능한 변인(개방 시간, 이산화탄소 농도)이 포함되어 있습니다." },
      { id: 7, text: "LED 조명의 색상(적색, 청색, 백색)에 따라 상추의 잎 크기와 생장 속도는 어떻게 변할까?", type: "high", reason: "변화시키는 조건과 측정할 결과가 명확한 수준 4의 질문입니다." },
      { id: 8, text: "토양의 종류(모래, 진흙, 배양토)에 따라 물이 빠지는 속도는 몇 초 차이가 날까?", type: "high", reason: "실험을 통해 구체적인 수치 데이터를 얻을 수 있습니다." },
      { id: 9, text: "기온이 1℃ 오를 때마다 우리 동네 모기 개체수는 얼마나 증가할까?", type: "high", reason: "기후 변화와 생태계 변화를 구체적인 데이터로 연결하여 탐구할 수 있습니다." },
      { id: 10, text: "습도 20% 증가에 따라 식빵에 곰팡이가 번식하는 면적은 어떻게 달라질까?", type: "high", reason: "변인이 구체적이며 관찰과 측정을 통해 답을 찾을 수 있습니다." },
      { id: 11, text: "경사도(10도, 20도, 30도)에 따라 빗물에 쓸려가는 흙의 양은 어떻게 다를까?", type: "high", reason: "조작 변인과 종속 변인이 수치화되어 있어 실험하기 좋습니다." },
      { id: 12, text: "산성비의 농도(pH)에 따라 무순의 줄기 길이는 어떻게 변할까?", type: "high", reason: "환경 문제(산성비)를 실험 가능한 변인으로 구체화했습니다." },
      { id: 13, text: "학교 옥상의 콘크리트 바닥과 화단 흙의 한낮 표면 온도 차이는 몇 도일까?", type: "high", reason: "직접 측정하여 비교 분석할 수 있는 구체적인 탐구 질문입니다." },
      { id: 14, text: "풍속이 2m/s 증가할 때 소형 풍력 발전기의 전압은 얼마나 높아질까?", type: "high", reason: "정확한 수치를 바탕으로 물리적 관계를 탐구할 수 있습니다." },
      { id: 15, text: "일조량에 따라 태양열 조리기로 물 500ml를 끓이는 데 걸리는 시간은 어떻게 달라질까?", type: "high", reason: "조건과 결과가 명확하여 에너지 효율을 실험할 수 있습니다." },

      // 낮은 수준 (15개)
      { id: 16, text: "폭염은 건강에 나쁜가요?", type: "low", reason: "예/아니오로 답할 수 있으며, 구체적인 변인이 없습니다." },
      { id: 17, text: "기후변화란 무엇인가요?", type: "low", reason: "단순한 개념 설명으로, 검색을 통해 바로 답을 알 수 있습니다." },
      { id: 18, text: "지구를 지키려면 어떻게 해야 하나요?", type: "low", reason: "탐구 질문이라기보다는 해결 방안을 묻는 포괄적인 질문입니다." },
      { id: 19, text: "북극곰은 멸종위기인가요?", type: "low", reason: "사실 확인에 불과하여 예/아니오로 끝나는 수준 1의 질문입니다." },
      { id: 20, text: "온실가스는 왜 발생하나요?", type: "low", reason: "원인을 묻고 있으나 검색(설명)으로 쉽게 해결되는 수준 2의 질문입니다." },
      { id: 21, text: "환경 오염은 심각한가요?", type: "low", reason: "가치 판단이 들어가 있으며, 객관적인 실험/측정이 어렵습니다." },
      { id: 22, text: "나무를 많이 심으면 공기가 맑아질까요?", type: "low", reason: "예/아니오로 답할 수 있으며 측정 기준이 모호합니다." },
      { id: 23, text: "지구 온난화를 막을 수 있나요?", type: "low", reason: "매우 광범위하고 예/아니오로 끝날 수 있는 수준 1 질문입니다." },
      { id: 24, text: "재활용을 하면 환경에 좋나요?", type: "low", reason: "당연한 사실을 묻는 가치 판단형 질문입니다." },
      { id: 25, text: "미세먼지는 어디서 오나요?", type: "low", reason: "검색을 통해 발생원을 나열하면 끝나는 질문입니다." },
      { id: 26, text: "기후위기가 오면 인류는 멸망하나요?", type: "low", reason: "과학적 탐구보다는 미래에 대한 추측이나 예/아니오에 가깝습니다." },
      { id: 27, text: "태양광 발전은 좋은 건가요?", type: "low", reason: "좋고 나쁨의 주관적 판단을 묻고 있어 탐구가 불가능합니다." },
      { id: 28, text: "플라스틱을 안 쓰면 어떻게 되나요?", type: "low", reason: "상황을 가정할 뿐 구체적인 측정 변인이 없습니다." },
      { id: 29, text: "우리나라의 여름은 왜 더워지나요?", type: "low", reason: "검색을 통해 기상학적 원인을 설명하면 되는 수준 2 질문입니다." },
      { id: 30, text: "이산화탄소는 나쁜 기체인가요?", type: "low", reason: "물질에 대해 가치 판단을 하고 있어 탐구 질문으로 부적절합니다." }
    ];

    const App = () => {
      const [gameState, setGameState] = useState('intro');
      const [userName, setUserName] = useState('');
      const [gameQuestions, setGameQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [timeLeft, setTimeLeft] = useState(20);
      const [records, setRecords] = useState([]);
      const [currentUpgradeText, setCurrentUpgradeText] = useState('');
      
      const timerRef = useRef(null);

      const startGame = () => {
        if (!userName.trim()) {
          alert("탐구 기록을 남길 연구원 이름을 입력해주세요!");
          return;
        }
        const highs = QUESTION_DB.filter(q => q.type === 'high').sort(() => 0.5 - Math.random()).slice(0, 5);
        const lows = QUESTION_DB.filter(q => q.type === 'low').sort(() => 0.5 - Math.random()).slice(0, 5);
        const mixed = [...highs, ...lows].sort(() => 0.5 - Math.random());
        
        setGameQuestions(mixed);
        setRecords([]);
        setCurrentIndex(0);
        setGameState('criteria');
      };

      const startPlaying = () => {
        setGameState('playing');
        startTimer();
      };

      const startTimer = () => {
        setTimeLeft(20);
        clearInterval(timerRef.current);
        timerRef.current = setInterval(() => {
          setTimeLeft(prev => {
            if (prev <= 1) {
              clearInterval(timerRef.current);
              handleTimeOut();
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
      };

      const handleTimeOut = () => {
        const currentQ = gameQuestions[currentIndex];
        setRecords(prev => [...prev, {
          question: currentQ,
          studentChoice: 'timeout',
          isCorrect: false,
          upgradedText: null
        }]);
        moveToNext();
      };

      const handleAnswer = (choice) => {
        clearInterval(timerRef.current);
        const currentQ = gameQuestions[currentIndex];
        const isCorrect = currentQ.type === choice;
        
        if (choice === 'low') {
          setGameState('upgrade');
          setCurrentUpgradeText('');
        } else {
          setRecords(prev => [...prev, {
            question: currentQ,
            studentChoice: choice,
            isCorrect: isCorrect,
            upgradedText: null
          }]);
          moveToNext();
        }
      };

      const handleUpgradeSubmit = () => {
        if (!currentUpgradeText.trim()) {
          alert("데이터 분석을 위해 업그레이드된 질문을 작성해주세요!");
          return;
        }
        
        const currentQ = gameQuestions[currentIndex];
        const isCorrect = currentQ.type === 'low'; 
        
        setRecords(prev => [...prev, {
          question: currentQ,
          studentChoice: 'low',
          isCorrect: isCorrect,
          upgradedText: currentUpgradeText
        }]);
        
        moveToNext();
      };

      const moveToNext = () => {
        if (currentIndex < 9) {
          setCurrentIndex(prev => prev + 1);
          setGameState('playing');
          startTimer();
        } else {
          setGameState('result');
        }
      };

      const generatePrompt = () => {
        let scoreRecords = "";
        let correctCount = 0;
        
        records.forEach((r, idx) => {
          const qNum = idx + 1;
          const isCorrectText = r.isCorrect ? "✓" : "✗";
          if (r.isCorrect) correctCount++;
          
          const choiceKor = r.studentChoice === 'high' ? '높은 수준' : (r.studentChoice === 'low' ? '낮은 수준' : '시간초과');
          const ansKor = r.question.type === 'high' ? '높은 수준' : '낮은 수준';
          
          scoreRecords += `Q${qNum}. "${r.question.text}"\n`;
          scoreRecords += `    → 정답: ${ansKor} (이유: ${r.question.reason})\n`;
          scoreRecords += `    → 학생 판정: ${choiceKor} ${isCorrectText}\n\n`;
        });

        let upgradeRecords = "";
        const upgradedItems = records.filter(r => r.upgradedText);
        
        if (upgradedItems.length > 0) {
          upgradedItems.forEach((r, idx) => {
            upgradeRecords += `① 원래: "${r.question.text}"\n`;
            upgradeRecords += `   → 내 질문: "${r.upgradedText}"\n\n`;
          });
        } else {
          upgradeRecords = "업그레이드한 질문 없음.\n\n";
        }

        return `아래는 중학교 1학년 과학 수업 "질문 판정단 게임" 결과입니다.\n이름: ${userName}\n\n[게임 기록 + 정답 대조표]\n${scoreRecords}\n[업그레이드한 질문 전체]\n${upgradeRecords}\n─────────────────────────────────────────\n위 결과를 바탕으로 아래 형식으로만 응답하세요.\n채점 기준: 판정 정답 1개당 +8점, 업그레이드 질문이 수준4면 +20점, 수준3이면 +12점, 수준2면 +5점, 수준1이면 +0점 (업그레이드 점수는 여러 개일 경우 평균 환산 후 20점 만점으로 계산하여 소계에 반영)\n반드시 아래 형식 그대로 복사하기 좋게 출력하세요.\n\n📋 질문 판정단 게임 결과 보고서\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n이름: ${userName}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n[판정 채점]\nQ1 정답 ${records[0]?.isCorrect?'✓':'✗'} / Q2 정답 ${records[1]?.isCorrect?'✓':'✗'} / Q3 정답 ${records[2]?.isCorrect?'✓':'✗'} / Q4 정답 ${records[3]?.isCorrect?'✓':'✗'} / Q5 정답 ${records[4]?.isCorrect?'✓':'✗'} / Q6 정답 ${records[5]?.isCorrect?'✓':'✗'} / Q7 정답 ${records[6]?.isCorrect?'✓':'✗'} / Q8 정답 ${records[7]?.isCorrect?'✓':'✗'} / Q9 정답 ${records[8]?.isCorrect?'✓':'✗'} / Q10 정답 ${records[9]?.isCorrect?'✓':'✗'}\n판정 소계: ${correctCount * 8}점\n\n[업그레이드 질문 평가]\n(원래 질문 → 내 질문) 형태로 나열 후, 아래에 '수준: O / 평가: 한 문장' 작성\n소계: O점\n\n[최종 점수] O점 / 100점\n[한줄 피드백] (학생의 탐구력을 칭찬하고 발전 방향을 제시하는 한 줄)\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`;
      };

      const handleCopyPrompt = async () => {
        const prompt = generatePrompt();
        try {
          await navigator.clipboard.writeText(prompt);
          alert("AI 평가 프롬프트가 복사되었습니다!\n새 창에서 Gemini를 열어 붙여넣고 결과를 확인하세요.");
        } catch (err) {
          const textArea = document.createElement("textarea");
          textArea.value = prompt;
          document.body.appendChild(textArea);
          textArea.select();
          document.execCommand("copy");
          textArea.remove();
          alert("AI 평가 프롬프트가 복사되었습니다!\n새 창에서 Gemini를 열어 붙여넣고 결과를 확인하세요.");
        }
      };

      const renderStars = () => {
        const stars = Array.from({ length: 40 }).map((_, i) => (
          <div key={i} className="star" style={{
            width: `${Math.random() * 2 + 1}px`, 
            height: `${Math.random() * 2 + 1}px`, 
            left: `${Math.random() * 100}%`, 
            top: `${Math.random() * 100}%`,
            animationDelay: `${Math.random() * 5}s`
          }} />
        ));
        return <div className="starfield">{stars}</div>;
      };

      if (gameState === 'intro') {
        return (
          <div className="min-h-screen text-white flex flex-col items-center justify-center p-6 relative overflow-hidden">
            {renderStars()}
            <div className="z-10 text-center max-w-2xl w-full">
              <div className="mb-8 relative inline-block">
                <IconAtom size={80} className="text-cyan-400 animate-[spin_20s_linear_infinite] mx-auto opacity-90 drop-shadow-[0_0_15px_rgba(0,255,255,0.5)]" />
              </div>
              <h1 className="title-font text-5xl md:text-7xl mb-6 text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-blue-500 drop-shadow-[0_0_10px_rgba(0,200,255,0.3)]">
                질문 판정단
              </h1>
              <p className="text-xl md:text-2xl text-cyan-50 mb-10 font-semibold tracking-wide drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] max-w-lg mx-auto leading-relaxed">
                질문을 판별하고 업그레이드하며<br />높은 수준의 질문을 만들어보자!
              </p>
              <div className="glass-panel rounded-2xl p-8 max-w-md mx-auto neon-border">
                <input 
                  type="text" 
                  placeholder="연구원(학생) 이름 입력" 
                  className="w-full bg-slate-800/50 border border-slate-600 rounded-lg px-4 py-3 mb-6 text-white text-center focus:outline-none focus:border-cyan-400 transition-colors font-light"
                  value={userName}
                  onChange={(e) => setUserName(e.target.value)}
                  onKeyDown={(e) => e.key === 'Enter' && startGame()}
                />
                <button 
                  onClick={startGame}
                  className="w-full bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 text-white font-bold py-4 rounded-lg shadow-[0_0_15px_rgba(0,255,255,0.4)] transition-all flex items-center justify-center gap-2 text-lg"
                >
                  <IconPlay size={20} className="mr-2" /> 데이터 분석 시작
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'criteria') {
        return (
          <div className="min-h-screen text-white flex flex-col p-4 md:p-8 relative">
            {renderStars()}
            <div className="z-10 max-w-4xl mx-auto w-full">
              <h2 className="title-font text-3xl text-cyan-300 mb-6 text-center tracking-wide">탐구질문 판별 기준 (DATA CORE)</h2>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                <div className="glass-panel p-5 rounded-xl border-l-4 border-l-red-500">
                  <div className="flex items-center gap-2 mb-2">
                    <h3 className="font-bold text-red-400">수준 1</h3>
                    <span className="text-[10px] bg-red-500/20 text-red-300 px-2 py-0.5 rounded border border-red-500/30">탐구 불가</span>
                  </div>
                  <p className="text-gray-300 font-light text-sm">예/아니오로 답할 수 있다.</p>
                  <p className="text-xs text-gray-500 mt-2">ex) 폭염이 건강에 나쁜가요?</p>
                </div>
                <div className="glass-panel p-5 rounded-xl border-l-4 border-l-orange-400">
                  <div className="flex items-center gap-2 mb-2">
                    <h3 className="font-bold text-orange-400">수준 2</h3>
                    <span className="text-[10px] bg-orange-500/20 text-orange-300 px-2 py-0.5 rounded border border-orange-500/30">단순 검색</span>
                  </div>
                  <p className="text-gray-300 font-light text-sm">검색하여 설명하면 답할 수 있다.</p>
                  <p className="text-xs text-gray-500 mt-2">ex) 온실가스는 왜 생기나요?</p>
                </div>
                <div className="glass-panel p-5 rounded-xl border-l-4 border-l-green-400">
                  <div className="flex items-center gap-2 mb-2">
                    <h3 className="font-bold text-green-400">수준 3</h3>
                    <span className="text-[10px] bg-green-500/20 text-green-300 px-2 py-0.5 rounded border border-green-500/30">탐구 가능</span>
                  </div>
                  <p className="text-gray-300 font-light text-sm">실험이나 데이터로 답을 찾아야 한다.</p>
                  <p className="text-xs text-gray-500 mt-2">ex) 온도에 따라 식물의 생장은 어떻게 다를까?</p>
                </div>
                <div className="glass-panel p-5 rounded-xl border-l-4 border-l-cyan-400 neon-border">
                  <div className="flex items-center gap-2 mb-2">
                    <h3 className="font-bold text-cyan-400">수준 4</h3>
                    <span className="text-[10px] bg-cyan-500/20 text-cyan-300 px-2 py-0.5 rounded border border-cyan-500/30">탐구 최적</span>
                  </div>
                  <p className="text-gray-300 font-light text-sm">실험·데이터 필요 + 바꾸는 것과 측정하는 것(변인)이 구체적이다.</p>
                  <p className="text-xs text-cyan-700 mt-2">ex) 온도가 10℃ 오를 때 강낭콩 발아율은 몇 % 변할까?</p>
                </div>
              </div>
              <div className="glass-panel p-6 rounded-xl mb-8">
                <h4 className="text-blue-300 font-bold mb-3 flex items-center gap-2"><IconCpu size={18}/> 미션 규칙</h4>
                <ul className="list-disc list-inside text-gray-300 space-y-2 font-light text-sm">
                  <li>제시되는 질문이 <b>높은 수준(수준 3~4)</b>인지 <b>낮은 수준(수준 1~2)</b>인지 20초 안에 판정하세요.</li>
                  <li>만약 <b>'낮은 수준'</b>이라고 판정했다면, 더 좋은 탐구질문으로 <b>업그레이드</b>해야 합니다.</li>
                  <li>총 10개의 데이터 기록을 분석하게 됩니다.</li>
                </ul>
              </div>
              <button 
                onClick={startPlaying}
                className="w-full md:w-1/2 mx-auto bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 rounded-lg shadow-[0_0_15px_rgba(0,255,255,0.3)] transition-all flex items-center justify-center gap-2 text-lg"
              >
                데이터 수신 및 판독 시작 <IconChevronRight />
              </button>
            </div>
          </div>
        );
      }

      if (gameState === 'playing') {
        const currentQ = gameQuestions[currentIndex];
        const timeRatio = timeLeft / 20;
        
        return (
          <div className="min-h-screen text-white flex flex-col p-4 md:p-8 relative">
            {renderStars()}
            <div className="z-10 w-full max-w-3xl mx-auto flex flex-col h-full justify-center mt-10">
              <div className="flex justify-between items-center mb-6 text-gray-400">
                <span className="font-bold tracking-widest text-cyan-500">ANALYSIS {currentIndex + 1}/10</span>
                <span className="font-bold flex items-center gap-2">
                  TIMER <span className={`text-xl ${timeLeft <= 5 ? 'text-red-500 animate-pulse' : 'text-white'}`}>00:{timeLeft.toString().padStart(2, '0')}</span>
                </span>
              </div>
              <div className="w-full bg-gray-800 rounded-full h-2 mb-10 overflow-hidden">
                <div 
                  className={`h-2 transition-all ease-linear duration-1000 ${timeRatio > 0.5 ? 'bg-cyan-400' : timeRatio > 0.25 ? 'bg-orange-400' : 'bg-red-500'}`}
                  style={{ width: `${timeRatio * 100}%` }}
                ></div>
              </div>
              <div className="glass-panel rounded-2xl p-10 md:p-14 text-center mb-10 min-h-[250px] flex items-center justify-center relative overflow-hidden neon-border">
                <IconCpu className="absolute -top-10 -left-10 text-slate-800 opacity-30" size={160} />
                <h2 className="text-2xl md:text-4xl font-semibold leading-relaxed drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] z-10">
                  "{currentQ.text}"
                </h2>
              </div>
              <div className="grid grid-cols-2 gap-6">
                <button 
                  onClick={() => handleAnswer('high')}
                  className="group glass-panel hover:bg-cyan-900/40 border-cyan-500/50 rounded-xl p-8 flex flex-col items-center gap-4 transition-all hover:scale-[1.02]"
                >
                  <div className="w-16 h-16 rounded-full bg-cyan-500/20 flex items-center justify-center group-hover:bg-cyan-500/40 transition-colors shadow-[0_0_15px_rgba(0,255,255,0.2)] group-hover:shadow-[0_0_25px_rgba(0,255,255,0.4)]">
                    <IconMicroscope className="text-cyan-300" size={32} />
                  </div>
                  <div className="text-center">
                    <span className="block title-font text-2xl text-cyan-300 mb-1">높은 수준</span>
                    <span className="text-xs font-light text-gray-400">(수준 3~4: 구체적 탐구 가능)</span>
                  </div>
                </button>
                <button 
                  onClick={() => handleAnswer('low')}
                  className="group glass-panel hover:bg-red-900/40 border-red-500/50 rounded-xl p-8 flex flex-col items-center gap-4 transition-all hover:scale-[1.02]"
                >
                  <div className="w-16 h-16 rounded-full bg-red-500/20 flex items-center justify-center group-hover:bg-red-500/40 transition-colors shadow-[0_0_15px_rgba(255,0,0,0.2)] group-hover:shadow-[0_0_25px_rgba(255,0,0,0.4)]">
                    <IconSearch className="text-red-400" size={32} />
                  </div>
                  <div className="text-center">
                    <span className="block title-font text-2xl text-red-400 mb-1">낮은 수준</span>
                    <span className="text-xs font-light text-gray-400">(수준 1~2: 단순 지식/가치판단)</span>
                  </div>
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'upgrade') {
        const currentQ = gameQuestions[currentIndex];
        return (
          <div className="min-h-screen text-white flex flex-col p-4 md:p-8 relative">
            {renderStars()}
            <div className="z-10 w-full max-w-3xl mx-auto flex flex-col mt-10">
              <div className="glass-panel p-8 rounded-2xl border-purple-500/30 mb-6 shadow-[0_0_20px_rgba(168,85,247,0.15)]">
                <div className="flex items-center gap-3 text-purple-400 mb-4">
                  <IconCpu size={28} />
                  <h3 className="title-font text-2xl">질문 업그레이드 프로토콜</h3>
                </div>
                <p className="font-light text-gray-300 mb-6 leading-relaxed">
                  연구원님은 다음 질문을 <b>낮은 수준</b>으로 판정했습니다.<br/>
                  이 질문이 실험이나 데이터 분석이 가능하도록(수준 3~4) <b>변인을 포함하여 구체적으로 재작성</b>해주세요.
                </p>
                <div className="bg-slate-900/80 p-5 rounded-xl border border-slate-700 mb-6 text-gray-400">
                  <span className="text-xs text-gray-500 block mb-1">원본 데이터</span>
                  <span className="text-white font-medium">"{currentQ.text}"</span>
                </div>
                <textarea 
                  className="w-full bg-slate-900/60 border border-purple-500/50 rounded-xl p-5 text-white focus:outline-none focus:border-purple-400 transition-colors min-h-[150px] text-lg font-light placeholder:text-slate-600 custom-scrollbar"
                  placeholder="예: (조작변인)에 따라 (종속변인)은 어떻게 달라질까?"
                  value={currentUpgradeText}
                  onChange={(e) => setCurrentUpgradeText(e.target.value)}
                ></textarea>
              </div>
              <button 
                onClick={handleUpgradeSubmit}
                className="w-full bg-gradient-to-r from-purple-600 to-fuchsia-600 hover:from-purple-500 hover:to-fuchsia-500 text-white font-bold py-4 rounded-xl shadow-[0_0_15px_rgba(168,85,247,0.4)] transition-all flex items-center justify-center gap-2 text-lg"
              >
                업그레이드 완료 및 다음 분석 <IconChevronRight />
              </button>
            </div>
          </div>
        );
      }

      if (gameState === 'result') {
        return (
          <div className="min-h-screen text-white flex flex-col p-4 md:p-8 relative">
            {renderStars()}
            <div className="z-10 w-full max-w-4xl mx-auto mt-4">
              <div className="text-center mb-10">
                <h2 className="title-font text-4xl text-cyan-400 mb-2">분석 완료!</h2>
                <p className="text-gray-400 font-light text-lg">연구원 {userName}의 판정 기록이 모두 수집되었습니다.</p>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div className="glass-panel p-6 rounded-2xl">
                  <h3 className="font-bold text-xl mb-4 text-blue-300">내 판정 요약</h3>
                  <div className="space-y-3 h-64 overflow-y-auto pr-2 custom-scrollbar">
                    {records.map((r, i) => (
                      <div key={i} className="flex items-center gap-3 text-sm font-light border-b border-slate-700/50 pb-2">
                        <span className="text-cyan-500 font-bold w-6">Q{i+1}</span>
                        <span className="truncate flex-1 text-gray-300">{r.question.text}</span>
                        {r.isCorrect ? 
                          <IconCheckCircle className="text-green-400 flex-shrink-0" size={16} /> : 
                          <IconXCircle className="text-red-400 flex-shrink-0" size={16} />
                        }
                      </div>
                    ))}
                  </div>
                </div>
                <div className="glass-panel p-6 rounded-2xl neon-border">
                  <h3 className="font-bold text-xl mb-4 text-cyan-300 flex items-center gap-2">
                    <IconCpu /> AI 최종 평가 받기
                  </h3>
                  <p className="text-sm font-light text-gray-300 mb-6 leading-relaxed">
                    내가 판정한 정답 기록과 직접 <b>업그레이드한 질문들</b>을 AI에게 제출하여 최종 점수와 피드백을 받으세요.
                  </p>
                  <div className="bg-slate-900/60 p-4 rounded-xl border border-slate-700 mb-6">
                    <ol className="list-decimal list-inside text-xs text-gray-400 space-y-2">
                      <li>아래 <b>[평가 프롬프트 복사]</b> 버튼을 누릅니다.</li>
                      <li>Gemini 또는 ChatGPT를 엽니다.</li>
                      <li>복사한 내용을 그대로 붙여넣고 전송합니다.</li>
                      <li>AI가 생성한 <b>결과 보고서</b>를 복사하여 <b>구글 클래스룸 과제방</b>에 제출하면 끝!</li>
                    </ol>
                  </div>
                  <button 
                    onClick={handleCopyPrompt}
                    className="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-4 rounded-xl shadow-[0_0_15px_rgba(0,255,255,0.4)] transition-all flex items-center justify-center gap-2 text-lg"
                  >
                    <IconCopy size={18} className="mr-2" /> 평가 프롬프트 복사하기
                  </button>
                </div>
              </div>
              <div className="text-center mt-8 pb-10">
                <button onClick={() => window.location.reload()} className="text-sm text-gray-500 hover:text-cyan-300 underline transition-colors">
                  처음부터 다시하기
                </button>
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    // 리액트 앱 렌더링
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
